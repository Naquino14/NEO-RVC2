title:
  Unicore UC6580 GNSS receiver
description: |
  The Unicore UC6580A and UC6580I are dual-frequency multi-constellation GNSS SoC. 
  It supports GPS, BDS, GONLASS, Galileio, QZSS, NavIC, and SBAS. It supports 1, 5, or 10 HZ updates, 
  and uses the NMEA-0183 standard, RTCM and RTCM extended, as well as Unicore's own sentences. Though this driver uses UART, 
  the SoC itself supports SPI and I2S as well. 

compatible: "unicore,uc6580"

include: uart-device.yaml

properties: 
  reg:
    required: false