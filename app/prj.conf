CONFIG_BOOTLOADER_MCUBOOT=y

# memory
CONFIG_MAIN_STACK_SIZE=4096

CONFIG_GPIO=y
CONFIG_I2C=y

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_SHELL=y
# CONFIG_CONSOLE_SUBSYS=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_LOG_PRINTK=y

# display and lvgl
CONFIG_DISPLAY=y
CONFIG_LVGL=y
# CHANGEME: If lvgl is used later, bump this or remove lvgl
CONFIG_LV_Z_MEM_POOL_SIZE=8 

# CAN reqs
CONFIG_CAN=y
CONFIG_CAN_SHELL=y

# gnss reqs
CONFIG_GNSS=y
CONFIG_GNSS_SATELLITES=y
CONFIG_MODEM=y
CONFIG_MODEM_MODULES=y
CONFIG_GNSS_DUMP_TO_LOG=y
CONFIG_GNSS_DUMP_TO_LOG_BUF_SIZE=1024

# sd card reqs
CONFIG_DISK_DRIVERS=y
CONFIG_DISK_ACCESS=y
CONFIG_FILE_SYSTEM=y
CONFIG_SDMMC_SUBSYS=y
CONFIG_DISK_DRIVER_SDMMC=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_SD_LOG_LEVEL_WRN=y
CONFIG_FS_FATFS_LFN=y # large filenames >14 chars

# I2S audio reqs
CONFIG_I2S=y

# lora reqs
CONFIG_SPI=y
CONFIG_LORA=y

# kernel extras
CONFIG_KERNEL_SHELL=y
CONFIG_REBOOT=y

# disable outside of debugging
CONFIG_GNSS_LOG_LEVEL_DBG=y
CONFIG_MODEM_MODULES_LOG_LEVEL_DBG=y
CONFIG_LOG_MODE_IMMEDIATE=y